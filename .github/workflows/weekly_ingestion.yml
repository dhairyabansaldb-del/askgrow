name: Weekly Mutual Fund Data Ingestion

on:
  push:
    branches:
      - master
      - main
  schedule:
    # Runs at 10:00 AM IST (04:30 UTC) every Monday
    - cron: '30 4 * * 1'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

jobs:
  ingest-data:
    runs-on: ubuntu-latest
    
    # Needs permissions to commit changes back to the repository
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Master Ingestion Script (Phase 1.6)
        run: |
          cd phases/phase_1/phase_1.6_scheduling
          python ingest_all.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add phases/phase_1/phase_1.2_scraping/raw_data/
          git add phases/phase_1/phase_1.2_scraping/cleaned_data/
          git add phases/phase_1/phase_1.3_chunking/chunks/
          git add phases/phase_1/phase_1.4_embedding/embeddings/
          git add phases/phase_1/phase_1.5_vector_storage/chroma_db/
          
          # Only commit if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto-update mutual fund data [skip ci]"
            git push
          else
            echo "No changes detected in data."
          fi
